<!DOCTYPE html>
<html>
<head>
  <title>Prediction Market Analyzer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      margin-top: 120px;
    }

    .container {
      width: 600px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-top: 20px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #ff6b4a;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 30px;
      font-size: 20px;
    }

  </style>

</head>

<body>

<div class="container">

<h1>Prediction Market Analyzer</h1>

<input
  id="urlInput"
  placeholder="Paste a Kalshi, Polymarket, Gemini, or Coinbase market URL"
/>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
